<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | TravelApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light d-flex align-items-center min-vh-100 py-5">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6" style="max-width: 500px;">
                <div class="card shadow border-0 rounded-4">

                    <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
                        <h2 class="fw-bold mb-0">Join TravelApp</h2>
                        <p class="mb-0 small text-white-50">Please fill in all mandatory fields to register</p>
                    </div>

                    <div class="card-body p-4 p-sm-5">
                        <form id="signupForm" novalidate>

                            <div class="mb-3">
                                <label for="fullName" class="form-label fw-bold">Full Name</label>
                                <input type="text" id="fullName" class="form-control" placeholder="Enter your full name">
                                <div id="nameError" class="error-msg text-danger small mt-1"></div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email Address</label>
                                <input type="email" id="email" class="form-control" placeholder="Enter Email Address">
                                <div id="emailError" class="error-msg text-danger small mt-1"></div>
                            </div>

                            <div class="mb-3">
                                <label for="phone" class="form-label fw-bold">Phone Number</label>
                                <input type="tel" id="phone" class="form-control" placeholder="Enter Phone Number">
                                <div id="phoneError" class="error-msg text-danger small mt-1"></div>
                            </div>

                            <div class="mb-3">
                                <label for="location" class="form-label fw-bold">Location / City</label>
                                <input type="text" id="location" class="form-control" placeholder="e.g. Chennai">
                                <div id="locationError" class="error-msg text-danger small mt-1"></div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-bold">Password</label>
                                <div class="input-group">
                                    <input type="password" id="password" class="form-control" placeholder="Min. 8 characters (letters & numbers)">
                                    <button class="btn btn-outline-secondary toggle-password" type="button" data-target="password">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                                </div>
                                <div id="passwordError" class="error-msg text-danger small mt-1"></div>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-bold">Confirm Password</label>
                                <div class="input-group">
                                    <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password">
                                    <button class="btn btn-outline-secondary toggle-password" type="button" data-target="confirmPassword">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                                </div>
                                <div id="confirmPasswordError" class="error-msg text-danger small mt-1"></div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold shadow-sm mb-3">Sign Up</button>

                            <div class="text-center">
                                <span class="text-muted">Already have an account?</span>
                                <a href="SignIn.html" class="text-primary fw-bold text-decoration-none ms-1">Sign In here</a>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="js/index.js"></script>
</body>

</html>
