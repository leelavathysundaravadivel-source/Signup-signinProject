<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | TravelApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light d-flex align-items-center min-vh-100 py-5">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6" style="max-width: 500px;">
                <div class="card shadow border-0 rounded-4">

                    <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
                        <h2 class="fw-bold mb-0">Join TravelApp</h2>
                        <p class="mb-0 small text-white-50">Please fill in your credentials to login</p>
                    </div>

                    <div class="card-body p-4 p-sm-5">
                        <div id="authAlert" class="alert alert-danger d-none" role="alert"></div>

                        <form id="signinForm" novalidate>

                            <div class="mb-3">
                                <label for="signinEmail" class="form-label fw-bold">Email Address</label>
                                <input type="email" id="signinEmail" class="form-control" placeholder="Enter Email Address">
                                <div id="signinEmailError" class="error-msg text-danger small mt-1"></div>
                            </div>

                            <div class="mb-4">
                                <label for="signinPassword" class="form-label fw-bold">Password</label>
                                <div class="input-group">
                                    <input type="password" id="signinPassword" class="form-control" placeholder="Enter your password">
                                    <button class="btn btn-outline-secondary toggle-password" type="button" data-target="signinPassword">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                                </div>
                                <div id="signinPasswordError" class="error-msg text-danger small mt-1"></div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold shadow-sm mb-3">Sign In</button>

                            <div class="text-center">
                                <span class="text-muted">New to TravelApp?</span>
                                <a href="SignUp.html" class="text-primary fw-bold text-decoration-none ms-1">Sign Up here</a>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="js/index.js"></script>
</body>

</html>
